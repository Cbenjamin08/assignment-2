<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="src/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>-latest</title>
</head>

<body>
  <h1> Cubic Equation Solver </h1>

  <p> Please input 4 real numbers that represent the coefficients of a cubic function 
    <br> 
    <br> 
    ax³ + bx² + cx + d </p>

  <div class="container">
    <form id="cubic-form">
      <div class="input a">
        <label for="a">a value:</label>
        <input type="number" id="a" name="a" required />
      </div>
      <div class="input b">
        <label for="b">b value:</label>
        <input type="number" id="b" name="b" required />
      </div>
      <div class="input c">
        <label for="c">c value:</label>
        <input type="number" id="c" name="c" required />
      </div>
      <div class="input d">
        <label for="d">d value:</label>
        <input type="number" id="d" name="d" required />
      </div>
      <label for="result">Result:</label>
      <input type="text" id="result" name="result" />
      <input type="submit" value="Calculate" />
    </form>
  </div>

  <script src="script.ts"></script>
</body>

</html>
