<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="src/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>-latest</title>
</head>

<body>
  <h1> Cubic Equation Solver </h1>

  <p> Please input 4 real numbers that represent the coefficients of a cubic function
    <br>
    <br>
    ax³ + bx² + cx + d
  </p>

  <div class="container">
    <form id="cubic-form">
      <label for="a"> Enter A value: </label>
      <input type="text" id="a" name="a"> <br>
      <label for="b"> Enter B value: </label>
      <input type="text" id="b" name="b"> <br>
      <label for="c"> Enter C value: </label>
      <input type="text" id="c" name="c"> <br>
      <label for="d"> Enter D value: </label>
      <input type="text" id="d" name="d"> <br>
      <label for="result">Result:</label>
      <input type="text" id="result" name="result" />
      <input type="submit" value="Calculate" />

    </form>
  </div>

  <script src="src/main.ts"></script>
</body>

</html>
